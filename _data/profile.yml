short_bio: >-
  <p>
  Hi, I am currently a second-year M. Phil. student at The Hong Kong University of Science and Technology (Guangzhou) under supervision of
  <a href="https://www.mingmingfan.com/" target="_blank">Prof. Mingming FAN</a> and <a href="https://luoyuyu.vip/" target="_blank">Prof. Yuyu LUO</a>. 
  I am a member of <a href="https://www.mingmingfan.com/lab/" target="_blank">Accessible & Pervasive User EXperience (APEX) Group</a>. 
  I am interested in Computer Vision and Computer Graphics. I like to design and use different tools of AI and generative models to tackle different vision tasks. 
  More recently, I am learning and doing research on Human-Computer Interaction(HCI). 
  I am interested in the intersection of Computer Graphics and Human-Computer Interaction, exploring themes around Computer Vision, Human-AI Collaboration with Generative AI and Assistive Technology.

  </p>
  <p>
  I received my B.Eng. in Computer Science and Technology from Northeastern University of Academy of Computer and Communication Engineering.
  </p>
 

